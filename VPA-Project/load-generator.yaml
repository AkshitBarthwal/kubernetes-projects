apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: vpa-demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: load-generator

  template:
    metadata:
      labels:
        app: load-generator

    spec:
      containers:
      - name: busybox
        image: busybox:1.36

        command:
        - /bin/sh
        - -c

        args:
        - |
          while true
          do
            wget -q -O- http://nginx-service > /dev/null
            sleep 0.05
          done
